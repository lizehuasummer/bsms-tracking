{% extends "base.html" %}
{% block title %}BSMS - Sprint 详细安排{% endblock %}
{% block content %}
<div class="page-title"><i class="fas fa-tasks me-2"></i>Sprint 详细安排</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0" id="sprintTable">
            <thead><tr><th>功能点ID</th><th>IID</th><th>标题</th><th>系统</th><th>Sprint</th><th>阶段状态</th><th>GitLab 状态</th></tr></thead>
            <tbody id="sprintBody"></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$.getJSON('/api/sprint', function(d) {
    var tbody = $('#sprintBody').empty();
    d.items.forEach(function(i) {
        var statusClass = i.state === 'closed' ? 'badge-closed' : (i.stage_status === '已完成' ? 'badge-done' : 'badge-open');
        tbody.append('<tr><td>'+i.feature_id+'</td><td>#'+i.iid+'</td><td>'+i.title+'</td><td>'+i.system+'</td><td>'+i.sprint+'</td><td>'+i.stage_status+'</td><td><span class="badge '+statusClass+'">'+i.state+'</span></td></tr>');
    });
    $('#sprintTable').DataTable({ language: { url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/zh.json' }, pageLength: 25 });
});
</script>
{% endblock %}
